# Этот серверный блок обрабатывает HTTP-запросы для beauty.taurus.pp.ua
server {
    listen 80;
    listen [::]:80;
    server_name beauty.taurus.pp.ua;

    # Этот блок необходим для Certbot, чтобы он мог проверить владение доменом
    # и выпустить SSL-сертификат.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Все остальные HTTP-запросы будут автоматически перенаправляться на HTTPS-версию сайта.
    # Это обеспечивает безопасное соединение для всех пользователей.
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS-блок для beauty.taurus.pp.ua
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name beauty.taurus.pp.ua;

    # Пути к SSL-сертификатам, которые мы получили от Certbot.
    ssl_certificate /etc/letsencrypt/live/beauty.taurus.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beauty.taurus.pp.ua/privkey.pem;

    client_max_body_size 100M;

    location / {
        # Запросы перенаправляются на внутренний Docker-сервис beauty_saas_backend
        # который работает на порту 8000.
        proxy_pass http://beauty_saas_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Эти заголовки необходимы для корректной работы WebSocket,
        # если ваше приложение их использует.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
