  eridon_bot:
    container_name: eridon_bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - logging_data:/home/docker_user/app/log
    depends_on:
      - db
    restart: unless-stopped

